<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PrepPulse | Assessment</title>

    <link rel="stylesheet" href="css/assessment.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header>

        <h2>PrepPulse</h2>

        <span>AI Placement Readiness Analyzer</span>

    </header>

    <!-- Progress -->

    <div class="progress-container">

        <div class="progress-info">

            <span>Question <span id="currentQuestion">1</span>/20</span>

            <span id="progressPercent">5%</span>

        </div>

        <div class="progress-bar">

            <div class="progress-fill" id="progressFill"></div>

        </div>

    </div>

    <!-- Question Card -->

    <div class="question-card">

        <div class="category">

            DSA

        </div>

        <h1 id="question">

            How confident are you in solving an Array problem?

        </h1>

        <div class="options">

            <div class="option" data-value="1">
                🌱 Beginner
            </div>

            <div class="option" data-value="2">
                📘 Basic
            </div>

            <div class="option" data-value="3">
                🚀 Good
            </div>

            <div class="option" data-value="4">
                ⭐ Excellent
            </div>

        </div>

    </div>

    <!-- Navigation -->

    <div class="buttons">

        <button id="prevBtn">
            Previous
        </button>

        <button id="nextBtn">
            Next →
        </button>

    </div>

</div>

<script src="js/questions.js"></script>
<script src="js/assessment.js"></script>

</body>

</html>
